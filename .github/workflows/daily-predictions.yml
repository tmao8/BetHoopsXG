name: Daily NBA Predictions
on:
  schedule:
    - cron: '0 10 * * *' # Runs every day at 10:00 UTC (6:00 AM EST)
  workflow_dispatch: # Allows you to click a button to run it manually

permissions:
  contents: write # Important: Allows the bot to commit files

jobs:
  build-predictions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: pip install pandas requests nba_api scikit-learn tqdm
        
      - name: Generate Predictions
        env:
          PROXY_LIST: ${{ secrets.PROXY_LIST }}
        run: python generate_daily.py
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Build and Deploy React App to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd ui
          npm install
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          npm run deploy
